name: Release

on:
  push:
    tags: ['v*']

# Required Secrets (set in repo Settings → Secrets and variables → Actions):
#
#   APPLE_CERT_BASE64         — base64-encoded .p12 of Developer ID Application cert
#   APPLE_CERT_PASSWORD       — password set when exporting the .p12
#   APPLE_ID                  — Apple ID email used for notarization
#   APPLE_TEAM_ID             — 10-char Team ID (5GAMHB3974)
#   APPLE_NOTARIZE_PASSWORD   — app-specific password from appleid.apple.com
#   MINISIGN_PRIVATE_KEY      — full text of ~/.ferrispass/minisign.key (2 lines)
#   MINISIGN_PASSWORD         — passphrase set when generating the keypair
#
# Apple secrets — how to export the .p12 (one-time, on the Mac with the cert):
#   1. Keychain Access → "Developer ID Application" cert → File → Export → .p12
#   2. Set a password (this becomes APPLE_CERT_PASSWORD)
#   3. base64 < cert.p12 | pbcopy → paste as APPLE_CERT_BASE64
#
# Minisign secrets — generated by scripts/setup-minisign.sh:
#   - MINISIGN_PRIVATE_KEY = `cat ~/.ferrispass/minisign.key` (paste full content)
#   - MINISIGN_PASSWORD    = the passphrase you typed during setup-minisign.sh

jobs:
  build:
    name: Build & notarize DMG
    runs-on: macos-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Install build tools
        run: brew install create-dmg jq

      - name: Import code-signing cert
        uses: apple-actions/import-codesign-certs@v3
        with:
          p12-file-base64: ${{ secrets.APPLE_CERT_BASE64 }}
          p12-password: ${{ secrets.APPLE_CERT_PASSWORD }}

      - name: Set up notarization keychain profile
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_NOTARIZE_PASSWORD: ${{ secrets.APPLE_NOTARIZE_PASSWORD }}
        run: |
          xcrun notarytool store-credentials "ferrispass-notarize" \
            --apple-id "$APPLE_ID" \
            --team-id "$APPLE_TEAM_ID" \
            --password "$APPLE_NOTARIZE_PASSWORD"

      - name: Verify icon present
        run: |
          if [ ! -f bundle/icon.png ]; then
            echo "✗ bundle/icon.png missing — commit the icon before tagging a release" >&2
            exit 1
          fi

      - name: Verify tag matches package version
        run: |
          VERSION="$(sed -nE 's/^version[[:space:]]*=[[:space:]]*"([^"]+)".*/\1/p' Cargo.toml | head -1)"
          if [ "${GITHUB_REF_NAME}" != "v${VERSION}" ]; then
            echo "✗ Tag ${GITHUB_REF_NAME} does not match Cargo.toml version ${VERSION}" >&2
            exit 1
          fi

      # No updater-signing secret is staged or exported until after this step.
      # Cargo and dependency build scripts therefore cannot read the private
      # key path or passphrase.
      - name: Build, code-sign, notarize, staple, generate update manifest
        run: scripts/build-mac.sh

      - name: Upload unsigned release artefacts
        uses: actions/upload-artifact@v4
        with:
          name: unsigned-release
          path: |
            dist/*.dmg
            dist/*.app.tar.gz
            dist/update.json
          if-no-files-found: error
          retention-days: 1

  notes:
    name: Generate release notes
    needs: build
    runs-on: macos-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate release notes from conventional commits
        env:
          # Pin so a future cliff bump can't silently change the notes
          # format without us reviewing it.
          GIT_CLIFF_VERSION: 2.13.1
          GITHUB_REPO: ${{ github.repository }}
          # cliff 2.x auto-queries the GitHub API for PR/contributor
          # metadata when the remote is github.com. Without a token it
          # uses anonymous requests (60/h shared per IP) and the runner
          # pool gets rate-limited → 403 → release fails. Passing the
          # workflow's auto-issued GITHUB_TOKEN lifts the budget to the
          # standard 1000/h authenticated rate.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # We used to call orhun/git-cliff-action@v4 here, but its
          # post-step uses GNU `stat -c %s` to size-check the output
          # file, which fails on macOS's BSD stat (`stat: %s: bad
          # format`) and aborts the whole release. Cliff itself ran
          # fine — only the action's housekeeping was broken. Calling
          # the binary directly sidesteps that and gives us one less
          # third-party dependency to track.
          set -euo pipefail
          ARCHIVE="git-cliff-${GIT_CLIFF_VERSION}-aarch64-apple-darwin.tar.gz"
          curl -fsSL "https://github.com/orhun/git-cliff/releases/download/v${GIT_CLIFF_VERSION}/${ARCHIVE}" \
            | tar -xz
          BIN="git-cliff-${GIT_CLIFF_VERSION}/git-cliff"
          chmod +x "$BIN"

          # `--latest` outputs only the commits between the previous tag
          # and the one we're releasing now. `--strip header` drops cliff's
          # default top-of-file marker since the GitHub Release body is
          # already a per-release context.
          "$BIN" --config cliff.toml --latest --strip header --output RELEASE_NOTES.md

      - name: Upload release notes
        uses: actions/upload-artifact@v4
        with:
          name: release-notes
          path: RELEASE_NOTES.md
          if-no-files-found: error
          retention-days: 1

  sign:
    name: Sign updater artefacts
    needs: [build, notes]
    runs-on: macos-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Download unsigned release artefacts
        uses: actions/download-artifact@v4
        with:
          name: unsigned-release
          path: dist

      - name: Download release notes
        uses: actions/download-artifact@v4
        with:
          name: release-notes
          path: .

      - name: Install signing tools
        run: brew install minisign jq

      - name: Inject release notes into update manifest
        run: |
          set -euo pipefail
          NOTES_SIZE="$(wc -c < RELEASE_NOTES.md | tr -d '[:space:]')"
          if [ "${NOTES_SIZE}" -gt 131072 ]; then
            echo "✗ Release notes exceed the 128 KiB signing limit" >&2
            exit 1
          fi
          jq --rawfile notes RELEASE_NOTES.md '. + {notes: $notes}' \
            dist/update.json > dist/update.json.tmp
          mv dist/update.json.tmp dist/update.json

      - name: Stage minisign private key
        env:
          MINISIGN_PRIVATE_KEY: ${{ secrets.MINISIGN_PRIVATE_KEY }}
        run: |
          mkdir -p "${RUNNER_TEMP}/ferrispass"
          KEY="${RUNNER_TEMP}/ferrispass/minisign.key"
          printf '%s\n' "$MINISIGN_PRIVATE_KEY" | tr -d '\r' > "$KEY"
          chmod 600 "$KEY"

          if ! head -1 "$KEY" | grep -q "untrusted comment"; then
              echo "✗ MINISIGN_PRIVATE_KEY secret is malformed." >&2
              echo "  Expected the complete two-line minisign secret key." >&2
              exit 1
          fi

      - name: Sign updater payload and final manifest
        env:
          MINISIGN_KEY: ${{ runner.temp }}/ferrispass/minisign.key
          MINISIGN_PASSWORD: ${{ secrets.MINISIGN_PASSWORD }}
        run: |
          trap 'rm -f "${MINISIGN_KEY}"' EXIT
          scripts/build-mac.sh --sign-update

      - name: Upload signed release artefacts
        uses: actions/upload-artifact@v4
        with:
          name: signed-release
          path: |
            dist/*.dmg
            dist/*.app.tar.gz
            dist/*.minisig
            dist/update.json
          if-no-files-found: error
          retention-days: 1

  release:
    name: Publish release
    needs: [sign, notes]
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - name: Download signed release artefacts
        uses: actions/download-artifact@v4
        with:
          name: signed-release
          path: dist

      - name: Download release notes
        uses: actions/download-artifact@v4
        with:
          name: release-notes
          path: .

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          # Attach everything the project needs:
          # - .dmg          : human-friendly first download
          # - .app.tar.gz   : payload the in-app updater fetches
          # - .minisig      : detached signature paired with the tar.gz
          # - update.json + .minisig: signed manifest binding version, URL and payload
          files: |
            dist/*.dmg
            dist/*.app.tar.gz
            dist/*.minisig
            dist/update.json
          # Body comes from git-cliff's isolated notes job instead of GitHub's
          # generate_release_notes — the latter only produces a Full
          # Changelog link when there are no PRs/labels to categorise.
          body_path: RELEASE_NOTES.md
          generate_release_notes: false
          draft: false
          prerelease: false
