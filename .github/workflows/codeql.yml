name: CodeQL

on:
  pull_request:
    branches: [master, main]
  schedule:
    # Weekly re-scan covers `master` — push triggers were dropped because
    # the Rust build inside CodeQL takes 5–15 min (KDF crates dominate)
    # and adding that to every commit on master wasn't worth it. PRs
    # still get a full scan before merge, and the cron picks up newly-
    # published CodeQL rules against the existing tree.
    - cron: '0 6 * * 1'
  workflow_dispatch:

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  analyze:
    name: Analyze (rust)
    runs-on: macos-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: rust
          config-file: ./.github/codeql/codeql-config.yml

      - name: Build
        run: cargo build --verbose

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:rust"
